<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded rectangle background -->
  <rect width="512" height="512" rx="110" fill="url(#grad1)"/>
  
  <!-- Money bag icon -->
  <g transform="translate(256, 256)">
    <!-- Bag body -->
    <ellipse cx="0" cy="40" rx="100" ry="120" fill="#FFD700" stroke="#FFA500" stroke-width="8"/>
    
    <!-- Bag top -->
    <rect x="-60" y="-80" width="120" height="40" rx="20" fill="#FFD700" stroke="#FFA500" stroke-width="8"/>
    
    <!-- Dollar sign -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#2D5016" text-anchor="middle">$</text>
    
    <!-- Shine effect -->
    <ellipse cx="-40" cy="0" rx="25" ry="35" fill="rgba(255, 255, 255, 0.3)"/>
  </g>
  
  <!-- Sparkles -->
  <circle cx="100" cy="100" r="8" fill="#FFD700"/>
  <circle cx="412" cy="100" r="8" fill="#FFD700"/>
  <circle cx="100" cy="412" r="8" fill="#FFD700"/>
  <circle cx="412" cy="412" r="8" fill="#FFD700"/>
</svg>
